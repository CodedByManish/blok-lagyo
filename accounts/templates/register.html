{% extends "base.html" %}
{% load static %}

{% block title %}Sign Up - Bhok Lagyo{% endblock %}

{% block content %}
<div class="min-h-[80vh] flex items-center justify-center py-12">
    <div class="bg-white p-8 rounded-2xl shadow-lg w-full max-w-md border border-gray-100">
        <div class="flex justify-center mb-8">
            <div class="flex items-center gap-2">
                <div class="bg-white-500 p-2 rounded">
                    <img src="{{ MEDIA_URL }}images/logo.png" alt="Logo" class="h-10 w-auto">
                </div>
                <span class="text-3xl font-bold text-gray-800">Bhok Lagyo</span>
            </div>
        </div>
        
        <h2 class="text-2xl font-bold text-center mb-8">Create Account</h2>
        
        <form method="post" class="space-y-4">
            {% csrf_token %}
            
            <div class="grid grid-cols-2 gap-4">
                <div>
                    <label class="block text-sm font-medium text-gray-700">First Name</label>
                    <input type="text" name="first_name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500" required>
                </div>
                <div>
                    <label class="block text-sm font-medium text-gray-700">Last Name</label>
                    <input type="text" name="last_name" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500" required>
                </div>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Email Address</label>
                <input type="email" name="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500" placeholder="your@email.com" required>
                <span class="text-red-500 text-xs">{{ user_form.email.errors }}</span>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Phone Number</label>
                <input type="text" name="phone_number" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Address</label>
                <textarea name="address" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500" rows="2" required></textarea>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Password</label>
                <input type="password" name="password1" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500" required>
            </div>

            <div>
                <label class="block text-sm font-medium text-gray-700">Confirm Password</label>
                <input type="password" name="password2" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-orange-500" required>
            </div>

            <button type="submit" class="w-full bg-black text-white py-3 rounded-lg font-semibold hover:bg-gray-800 transition-all">
                Sign Up
            </button>
        </form>
        <p class="text-center mt-6 text-sm text-gray-600">
            Already have an account? <a href="{% url 'accounts:login' %}" class="text-orange-600 hover:text-orange-500 font-medium">Log in</a>
        </p>
    </div>
</div>
{% endblock %}
